<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God of Anime Black - Ultimate Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&family=Lalezar&family=Fira+Code:wght@400;700&display=swap');

        :root { --primary: #f59e0b; --bg: #09090b; --card: rgba(24, 24, 27, 0.75); --text: #f8fafc; --text-muted: #a1a1aa; --font: 'Lalezar'; --glass-border: rgba(245, 158, 11, 0.25); }
        .light-mode { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.85); --text: #0f172a; --text-muted: #64748b; --glass-border: rgba(0,0,0,0.1); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font), sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 60px; min-height: 100vh; min-height: 100dvh; }
        
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-size: cover; background-position: center; filter: blur(6px) brightness(0.4); z-index: -2; transition: 0.5s; }
        .light-mode #dynamic-bg { filter: blur(6px) brightness(0.85); }
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; pointer-events: none; z-index: -1; transform: translateZ(0); will-change: transform, opacity; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: var(--card); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: 1px; user-select: none; cursor: pointer; }
        .logo:hover { text-shadow: 0 0 15px var(--primary); }
        .head-btns { display: flex; gap: 10px; }
        .btn-icon { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--glass-border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-icon:hover { background: var(--primary); color: white; transform: rotate(15deg); }

        .search-box { position: relative; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 16px; display: flex; align-items: center; padding: 5px 15px; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        .search-box input { background: transparent; border: none; color: var(--text); padding: 12px; width: 100%; outline: none; font-size: 0.95rem; }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 12px; max-height: 300px; overflow-y: auto; z-index: 2000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .search-item { display: flex; gap: 12px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; align-items: center; }
        .search-item:hover { background: rgba(139, 92, 246, 0.1); }
        .search-item img { width: 45px; height: 65px; object-fit: cover; border-radius: 6px; }

        .section-title { font-size: 1.2rem; font-weight: bold; margin: 40px 0 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--primary), transparent); }

        .btn-heart { position: absolute; top: 8px; right: 8px; left: auto; z-index: 10; background: rgba(0,0,0,0.65); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 28px; height: 28px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
        .btn-heart.active { color: #ef4444; background: rgba(239,68,68,0.25); border-color: #ef4444; }
        .btn-heart:hover { transform: scale(1.2); }

        /* Watchlist UI */
        .wl-tabs-container { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .wl-tabs-container::-webkit-scrollbar { height: 3px; }
        .wl-tab-btn { padding: 6px 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; white-space: nowrap; color: var(--text-muted); transition: 0.3s; }
        .wl-tab-btn.active { background: var(--primary); color: white; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); border-color: var(--primary); }
        .wl-rail { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-behavior: smooth; }
        .wl-rail::-webkit-scrollbar { height: 6px; }
        .wl-rail::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .wl-card-mini { position: relative; min-width: 110px; width: 110px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 5px; cursor: pointer; transition: 0.3s; }
        .wl-card-mini:hover { border-color: var(--primary); transform: translateY(-5px); }
        .wl-card-mini img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }
        .wl-card-mini .wl-title { font-size: 0.75rem; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .wl-grid-dense { display: flex; flex-wrap: wrap; gap: 12px; padding: 5px; }
        
        /* INSTAGRAM STORY RING EFFECT */
        .wl-circle-item { position: relative; width: 68px; height: 68px; border-radius: 50%; cursor: pointer; padding: 3px; background: transparent; transition: 0.3s; }
        .wl-circle-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg); transition: 0.3s; }
        .wl-circle-item.has-story { background: linear-gradient(45deg, #f59e0b, #ef4444, #8b5cf6); animation: storyPulse 2s infinite; }
        @keyframes storyPulse { 0% { filter: brightness(1); box-shadow: 0 0 5px rgba(245, 158, 11, 0.5); } 50% { filter: brightness(1.2); box-shadow: 0 0 15px rgba(239, 68, 68, 0.8); } 100% { filter: brightness(1); box-shadow: 0 0 5px rgba(245, 158, 11, 0.5); } }
        .wl-circle-item:hover img { transform: scale(1.05); }
        
        .wl-circle-tooltip { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--primary); font-size: 0.65rem; padding: 2px 8px; border-radius: 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s; border: 1px solid var(--glass-border); z-index: 10; font-weight: bold; }
        .wl-circle-item:hover .wl-circle-tooltip { opacity: 1; bottom: -30px; }
        .wl-select, .wl-stars { margin-top: 5px; width: 100%; font-size: 0.7rem; background: rgba(0,0,0,0.6); color: var(--text); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 3px; outline: none; }
        .wl-stars { display: flex; justify-content: center; gap: 3px; border-top: none; }
        .wl-star { cursor: pointer; color: #555; } .wl-star.active { color: #f59e0b; }

        .live-tag { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; display: inline-block; }
        .st-airing { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); }
        .st-completed { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }

        .ep-watched { opacity: 0.7; border-color: rgba(16, 185, 129, 0.4) !important; background: rgba(16, 185, 129, 0.05) !important; }
        .ep-watched-icon { color: #10b981; margin-right: 8px; font-size: 0.85rem; }

        .days-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .days-nav::-webkit-scrollbar { height: 4px; }
        .day-tab { padding: 8px 20px; background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; }
        .day-tab.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        /* --- 3D Schedule Cards (TRADING CARD DESIGN) --- */
        .mySwiper-sched { width: 100%; padding: 20px 0 50px 0; }
        .sched-slide { width: 185px; height: 310px; border-radius: 15px; background: var(--card); border: 1px solid var(--glass-border); overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.6); cursor: pointer; }
        
        .sched-img-wrapper { position: relative; flex: 1; width: 100%; overflow: hidden; }
        .sched-slide-img { width: 100%; height: 100%; object-fit: cover; }
        .sched-img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.7) 40%, transparent 100%); padding: 30px 10px 10px; text-align: center; pointer-events: none; }
        
        .sched-se-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); border: 1px solid var(--primary); padding: 4px 10px; border-radius: 10px; color: #fff; font-size: 0.85rem; font-weight: bold; text-shadow: 0 0 8px var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10; font-family: 'Fira Code', monospace; }
        
        .sched-title { font-size: 1rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; text-shadow: 0 2px 5px #000; }
        .sched-time { color: var(--primary); font-size: 0.8rem; font-weight: bold; text-shadow: 0 2px 5px #000; }

        .sched-timer-section { padding: 10px; background: var(--card); border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: flex-end; }
        
        .battery-container { margin-top: auto; }
        .battery-box { border: 2px solid rgba(255,255,255,0.2); padding: 2px; border-radius: 6px; width: 100%; height: 14px; position: relative; display: flex; align-items: center; margin-bottom: 6px; }
        .battery-box::after { content: ''; position: absolute; left: -4px; top: 2px; width: 3px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 2px 0 0 2px; }
        .battery-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981); border-radius: 3px; width: 0%; transition: width 1s linear; box-shadow: 0 0 10px var(--primary); }
        
        .neon-countdown { display: flex; gap: 3px; justify-content: center; direction: rtl; }
        .neon-box { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1); padding: 3px; border-radius: 5px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .neon-box span { font-family: 'Fira Code', monospace; font-size: 0.9rem; font-weight: bold; color: #0ff; text-shadow: 0 0 8px #0ff; line-height: 1; margin-bottom: 2px; }
        .neon-box small { font-size: 0.55rem; color: #aaa; font-family: var(--font); line-height: 1; }

        /* --- Cinematic Hero Banner --- */
        .mySwiper-rec { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .hero-slide { width: 100%; min-height: 280px; position: relative; background: #000; display: flex; align-items: center; }
        .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: top center; filter: blur(12px) brightness(0.3); z-index: 0; transform: scale(1.1); }
        .hero-content { position: relative; z-index: 1; display: flex; gap: 20px; padding: 25px; width: 100%; align-items: center; justify-content: flex-start; }
        .hero-poster { width: 140px; height: 200px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); object-fit: cover; flex-shrink: 0; }
        .hero-details { flex: 1; color: #fff; text-align: right; overflow: hidden; }
        .hero-title { font-size: 1.25rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); white-space: normal; line-height: 1.4; }
        .hero-meta { display: flex; gap: 10px; font-size: 0.8rem; margin-bottom: 10px; flex-wrap: wrap; }
        .hero-meta span { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; backdrop-filter: blur(5px); }
        
        .hero-desc { font-size: 0.85rem; color: #ccc; line-height: 1.6; margin-bottom: 15px; max-height: 75px; overflow-y: auto; padding-left: 5px; }
        .hero-desc::-webkit-scrollbar { width: 4px; }
        .hero-desc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .hero-btn { background: linear-gradient(45deg, var(--primary), #ef4444); color: white; border: none; padding: 8px 20px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); display: inline-flex; align-items: center; gap: 8px; }
        .hero-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .swiper-pagination-bullet { background: #fff; opacity: 0.5; }
        .swiper-pagination-bullet-active { background: var(--primary); opacity: 1; box-shadow: 0 0 10px var(--primary); }

        /* Translation Rail (2 COLUMNS UPDATE) */
        .rail-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .trans-compact-card { display: flex; align-items: center; background: rgba(0,0,0,0.4); border: 1px dashed var(--glass-border); border-radius: 12px; padding: 8px; gap: 10px; transition: 0.3s; cursor: pointer; }
        .trans-compact-card:hover { border-color: var(--primary); background: rgba(245, 158, 11, 0.1); transform: scale(1.02); }
        .trans-compact-card img { width: 40px; height: 55px; object-fit: cover; border-radius: 6px; }
        .trans-info { flex: 1; overflow: hidden; }

        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .team-card { background: linear-gradient(145deg, var(--card), rgba(0,0,0,0.5)); border: 1px solid var(--glass-border); text-align: center; padding: 20px 10px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .team-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2); }
        .team-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin: 0 auto 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* --- Media Hub & 7 Tabs Styling --- */
        .season-neo-box { background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 255, 0.5); box-shadow: 0 0 12px rgba(0, 255, 255, 0.2); color: #0ff; outline: none; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: bold; text-align: center; direction: rtl; transition: 0.3s; }
        .season-neo-box:hover { box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); border-color: #0ff; }
        .season-neo-box option { background: #111; color: #0ff; }

        .hub-nav { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 5px; margin-bottom: 15px; overflow-x: auto; white-space: nowrap; }
        .hub-nav::-webkit-scrollbar { height: 4px; }
        .hub-nav::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .hub-tab { display: inline-flex; align-items: center; gap: 5px; padding: 10px 15px; text-align: center; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .hub-tab.active { background: var(--primary); color: white; box-shadow: 0 0 10px var(--primary); }
        
        .sub-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; transition: 0.2s; }
        .sub-row:hover { border-color: var(--primary); background: rgba(139, 92, 246, 0.05); }
        .sub-btn { background: var(--success); color: white; padding: 6px 15px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: bold; transition: 0.2s; display:inline-block; }
        .sub-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
        .sub-btn.disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed; }

        .f-btn { flex:1; min-width: 60px; padding: 8px 0; border-radius: 8px; text-align: center; font-size: 0.85rem; font-weight: bold; font-family: 'Fira Code', monospace; text-decoration: none; color: white; transition: 0.2s; display:block; margin-bottom:5px;}
        .f-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .f-btn.f-480 { background: #10b981; } .f-btn.f-720 { background: #0ea5e9; } 
        .f-btn.f-1080 { background: #8b5cf6; } .f-btn.f-1080x265 { background: #db2777; } .f-btn.f-4k { background: #f59e0b; }
        .f-btn.disabled { background: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; box-shadow: none; pointer-events: none;}

        details.glass-accordion { background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 8px; transition: 0.3s; }
        details.glass-accordion summary { padding: 12px 15px; cursor: pointer; font-weight: bold; font-size: 0.9rem; list-style: none; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        details.glass-accordion summary::-webkit-details-marker { display: none; }
        details.glass-accordion summary::after { content: '\f078'; font-family: 'Font Awesome 5 Free'; font-size: 0.8rem; transition: 0.3s; color: var(--primary); }
        details[open].glass-accordion summary::after { transform: rotate(180deg); }
        .accordion-content { padding: 15px; border-top: 1px dashed rgba(255,255,255,0.1); display: flex; gap: 8px; flex-wrap: wrap;}

        .cult-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); }
        .cult-table th { background: rgba(139, 92, 246, 0.2); padding: 12px; color: var(--primary); border-bottom: 1px solid var(--glass-border); }
        .cult-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text); font-size: 0.85rem; line-height: 1.6; }
        
        .layer-badge { display: inline-block; background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.5); padding: 2px 6px; border-radius: 6px; font-size: 0.65rem; margin-top: 5px; font-weight: bold; text-shadow: 0 0 5px rgba(245,158,11,0.5); }
        .realm-type-god { color: #0ea5e9; background: rgba(14, 165, 233, 0.15); border-color: rgba(14, 165, 233, 0.5); }

        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; text-align: center; }
        .char-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .char-role { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 3px; }
        .role-main { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }

        .news-card { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; margin-bottom: 15px; text-align: right; }
        .news-media { width: 100%; max-height: 200px; object-fit: cover; background: #000; }
        .news-content { padding: 15px; }
        .news-title { font-size: 1rem; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .news-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }
        .news-date { font-size: 0.7rem; color: #888; font-family: monospace; }

        .cmt-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; display: flex; gap: 10px; text-align: right; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .cmt-ava { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 1px solid var(--glass-border); }
        .cmt-admin { border-color: var(--primary); background: rgba(245, 158, 11, 0.1); }

        .btn-micro { flex: 1; min-width: 65px; background: rgba(0,0,0,0.4); color: var(--text); border: 1px solid #555; border-radius: 6px; padding: 6px 2px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-micro i { font-size: 1rem; color: var(--primary); }
        .btn-micro:hover { background: rgba(139, 92, 246, 0.2); border-color: var(--primary); color: white; }
        .btn-micro.danger i { color: #ef4444; }
        .btn-micro.danger:hover { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; }

        .footer-premium { position: relative; margin-top: 60px; padding: 20px; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(0,0,0,0.4)); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: var(--text); overflow: hidden; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .footer-premium:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.3); border-color: var(--primary); }
        .footer-glow { position: absolute; width: 120px; height: 120px; background: var(--primary); filter: blur(60px); border-radius: 50%; top: 50%; left: -20px; transform: translateY(-50%); opacity: 0.4; }
        .footer-icon { font-size: 2.2rem; color: #0088cc; z-index: 1; background: rgba(255,255,255,0.05); width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); }
        .footer-text { flex: 1; padding: 0 20px; z-index: 1; text-align: right; }
        .footer-text h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--primary); }
        .footer-text p { margin: 0; opacity: 0.8; font-family: 'Fira Code', monospace; font-size: 0.95rem; direction: ltr; text-align: right; font-weight: bold; }
        .footer-arrow { font-size: 1.5rem; opacity: 0.5; z-index: 1; transition: 0.3s; }
        .footer-premium:hover .footer-arrow { opacity: 1; transform: translateX(-8px); color: var(--primary); }

        .drawer { position: fixed; top: 0; width: 350px; max-width: 100vw; height: 100vh; height: 100dvh; background: rgba(9, 9, 11, 0.98); backdrop-filter: blur(20px); z-index: 1040; padding: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #settings-drawer { right: -400px; border-left: 2px solid var(--primary); }
        #settings-drawer.open { right: 0; }
        #admin-drawer { right: -400px; border-left: 2px solid var(--danger); }
        #admin-drawer.open { right: 0; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1030; display: none; backdrop-filter: blur(3px); }
        .overlay.open { display: block; }
        
        .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #444; background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 0.85rem;}
        .admin-form input:focus, .admin-form textarea:focus { border-color: var(--primary); }
        .admin-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s;}
        .admin-btn:hover { filter: brightness(1.1); }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; display: inline-block; margin: 3px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .color-btn:hover { transform: scale(1.2); border-color: white; }
        .st-btn { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; margin: 3px; font-size: 0.85rem; font-weight:bold; transition:0.2s;}
        .st-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>
<canvas id="fx-canvas"></canvas>
<script id="db-backup">window.PRELOADED_DB = null;</script>

<div class="overlay" id="overlay" onclick="closeAllDrawers(); document.getElementById('search-results').classList.add('hidden');"></div>

<!-- SETTINGS DRAWER -->
<div class="drawer" id="settings-drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--primary)"><i class="fas fa-cogs"></i> تنظیمات</h2>
        <i class="fas fa-times btn-icon" onclick="closeAllDrawers()"></i>
    </div>
    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 20px;">
        <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:10px; font-weight:bold;">رنگ تم (15 رنگ پرمیوم)</div>
        <div style="display: flex; flex-wrap: wrap; gap: 2px;" id="color-palette"></div>
    </div>
    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 20px;">
        <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">فونت سایت</div>
        <select id="font-select" onchange="setPref('font', this.value)" style="width:100%; padding:10px; background:var(--card); color:var(--text); border-radius:8px; border:1px solid var(--glass-border); outline:none;">
            <optgroup label="کلاسیک"><option value="Vazirmatn">Vazirmatn (استاندارد)</option><option value="Tahoma">Tahoma</option></optgroup>
            <optgroup label="هکری / برنامه‌نویسی"><option value="'Fira Code', monospace">Fira Code</option><option value="Consolas, monospace">Consolas</option></optgroup>
            <optgroup label="فانتزی"><option value="Lalezar">Lalezar (تیتر)</option><option value="'Comic Sans MS', cursive">Comic Sans</option></optgroup>
        </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; border: 1px solid var(--glass-border); text-align:center;">
            <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">حالت نمایش</div>
            <button class="st-btn" style="width: 100%; margin:0 0 5px 0;" onclick="setPref('isLight', false)">تاریک 🌙</button>
            <button class="st-btn" style="width: 100%; margin:0;" onclick="setPref('isLight', true)">روشن ☀️</button>
        </div>
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; border: 1px solid var(--glass-border); text-align:center;">
            <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">جلوه‌های بصری</div>
            <select id="fx-select" onchange="setPref('fx', this.value)" style="width:100%; padding:8px; background:var(--card); color:var(--text); border-radius:8px; border:1px solid var(--glass-border); outline:none;">
                <option value="none">خاموش 🚫</option><option value="snow">برف سه‌بعدی ❄️</option><option value="rain">باران یخی ملایم 🌧️</option>
            </select>
        </div>
    </div>
</div>

<!-- ADMIN DRAWER -->
<div class="drawer" id="admin-drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--danger)"><i class="fas fa-user-shield"></i> پنل مدیریت</h2>
        <i class="fas fa-times btn-icon" onclick="closeAllDrawers()"></i>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">
        <button class="admin-btn" style="margin:0; background:#8b5cf6" onclick="admTab('general')"><i class="fas fa-cogs"></i> تنظیمات عمومی</button>
        <button class="admin-btn" style="margin:0; background:var(--primary)" onclick="admTab('sched')"><i class="fas fa-calendar"></i> پخش هفتگی</button>
        <button class="admin-btn" style="margin:0; background:var(--info)" onclick="admTab('trans')"><i class="fas fa-language"></i> درحال ترجمه (اتوماتیک)</button>
        <button class="admin-btn" style="margin:0; background:var(--warning)" onclick="admTab('rec')"><i class="fas fa-star"></i> پیشنهاد روزانه (سینمایی)</button>
        <button class="admin-btn" style="margin:0; background:var(--success)" onclick="admTab('team')"><i class="fas fa-users"></i> تیم مترجمین (پروژه‌ها)</button>
    </div>
    <div id="admin-content" class="admin-form" style="border-top:1px dashed #444; padding-top:15px;"></div>
    <button onclick="exportDB()" class="admin-btn" style="background:#ef4444; margin-top:20px;"><i class="fas fa-save"></i> دانلود بکاپ دیتابیس</button>
</div>

<!-- MAIN UI -->
<div class="container">
    <header>
        <div class="logo" onclick="authAdmin()">ANIME <span style="color:var(--text)">BLACK</span></div>
        <div class="head-btns"><button class="btn-icon" onclick="openSettings()"><i class="fas fa-palette"></i></button></div>
    </header>

    <div class="search-box">
        <i class="fas fa-search" style="color:var(--primary); font-size:1.2rem; margin-left:10px;"></i>
        <input type="text" id="global-search" oninput="doSearch(this.value)" placeholder="جستجوی پیشرفته دانگوا (نام، ژانر و...)">
        <div id="search-results" class="search-results hidden"></div>
    </div>

    <!-- Watchlist Redesigned -->
    <div id="watchlist-wrap" class="hidden">
        <div class="section-title"><i class="fas fa-heart text-danger"></i> <span>لیست پیگیری من</span></div>
        <div class="wl-tabs-container">
            <div class="wl-tab-btn active" data-wltab="all" onclick="setWlTab('all')">همه <i class="fas fa-layer-group"></i></div>
            <div class="wl-tab-btn" data-wltab="watching" onclick="setWlTab('watching')">درحال دیدن <i class="fas fa-play-circle"></i></div>
            <div class="wl-tab-btn" data-wltab="plan" onclick="setWlTab('plan')">بعدا میبینم <i class="fas fa-clock"></i></div>
            <div class="wl-tab-btn" data-wltab="completed" onclick="setWlTab('completed')">تمام کردم <i class="fas fa-check-double"></i></div>
        </div>
        <div id="watchlist-content"></div>
    </div>

    <div class="section-title"><i class="fas fa-star"></i> <span>پیشنهاد روزانه</span></div>
    <!-- Cinematic Hero Slider -->
    <div class="swiper mySwiper-rec">
        <div class="swiper-wrapper" id="rec-list"></div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="section-title"><i class="fas fa-calendar-alt"></i> <span>پخش هفتگی</span></div>
    <div class="days-nav" id="days-nav"></div>
    <!-- 3D Cards Slider for Schedule -->
    <div class="swiper mySwiper-sched">
        <div class="swiper-wrapper" id="schedule-list"></div>
    </div>

    <div class="section-title"><i class="fas fa-language"></i> <span>درحال انتظار ترجمه</span></div>
    <div class="rail-container" id="trans-list"></div>

    <div class="section-title"><i class="fas fa-users"></i> <span>تیم انیمه بلک</span></div>
    <div class="team-grid" id="team-list"></div>

    <a href="https://t.me/godofanimeblack" target="_blank" class="footer-premium">
        <div class="footer-glow"></div>
        <div class="footer-icon"><i class="fab fa-telegram-plane"></i></div>
        <div class="footer-text">
            <h3>به جامعه انیمه بلک بپیوندید</h3>
            <p>@godofanimeblack</p>
        </div>
        <div class="footer-arrow"><i class="fas fa-chevron-left"></i></div>
    </a>
</div>

<script>
    window.Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: 'var(--card)', color: 'var(--text)' });
    window.lastAdminScroll = 0; // State for Scroll Keeper
    const colors = ['#8b5cf6', '#ef4444', '#f59e0b', '#10b981', '#0ea5e9', '#ec4899', '#14b8a6', '#f43f5e', '#64748b', '#f97316', '#84cc16', '#6366f1', '#d946ef', '#115e59', '#eab308'];
    const daysFa = ["یک‌شنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنج‌شنبه", "جمعه", "شنبه"];
    let activeDay = new Date().getDay();
    let currentWlTab = 'all';
    
    // Swiper instances
    let schedSwiper = null;
    let recSwiper = null;
    let editingSchedIdx = -1; // Admin Edit Tracker

    function getSafeDB() {
        if (window.PRELOADED_DB) return window.PRELOADED_DB;
        const keys = ['animeblack_db', 'godofanime_db', 'anime_db', 'vip_db_final'];
        for(let k of keys) { let data = localStorage.getItem(k); if(data) { try { let p = JSON.parse(data); if(p.schedule || p.team) return p; } catch(e) {} } }
        return { schedule: [], translation: [], recommendations: [], team: [], settings: { bgUrl: '' } };
    }
    
    let db = getSafeDB();
    if(!db.team) db.team = []; if(!db.schedule) db.schedule = []; if(!db.translation) db.translation = []; if(!db.recommendations) db.recommendations = []; if(!db.settings) db.settings = { bgUrl: '' };

    db.team.forEach(t => {
        if(t.projects) {
            t.projects = t.projects.map(p => {
                if(!p.id) p.id = Date.now() + Math.floor(Math.random()*10000);
                if(!p.nameEn) p.nameEn = p.name || ''; if(!p.desc) p.desc = 'بدون خلاصه.';
                if(!p.genres) p.genres = []; if(!p.aliases) p.aliases = [];
                if(!p.seasons) p.seasons = { 1: { type: 'فصل', epCount: p.epCount || 12, year: p.year || '2024', duration: p.duration || '24 دقیقه', img: p.img || 'https://via.placeholder.com/150', status: p.status || 'airing', subs: p.subs || {}, files: p.files || {} } };
                if(!p.adminActiveS) p.adminActiveS = 1;
                if(!p.cultivation) p.cultivation = []; if(!p.characters) p.characters = []; if(!p.news) p.news = [];
                if(!p.comments) p.comments = []; 
                return p;
            });
        }
    });

    let prefs = null; try { prefs = JSON.parse(localStorage.getItem('animeblack_prefs')); } catch(e) {}
    if(!prefs) prefs = { isLight: false, lang: 'fa', fx: 'none', primary: '#f59e0b', font: 'Lalezar' };
    
    let watchlist = JSON.parse(localStorage.getItem('animeblack_watchlist')) || [];
    let watchedHistoryRaw = JSON.parse(localStorage.getItem('animeblack_watched')) || {};
    let watchedHistory = {};
    Object.keys(watchedHistoryRaw).forEach(k => { watchedHistory[k] = watchedHistoryRaw[k].map(ep => { if(typeof ep === 'number' || !String(ep).includes('_')) return `1_${ep}`; return ep; }); });

    function saveDB() { localStorage.setItem('animeblack_db', JSON.stringify(db)); renderAll(); }
    function savePrefs() { localStorage.setItem('animeblack_prefs', JSON.stringify(prefs)); applyPrefs(); }
    function setPref(key, val) { prefs[key] = val; savePrefs(); }
    function applyPrefs() { 
        document.documentElement.style.setProperty('--primary', prefs.primary); 
        document.documentElement.style.setProperty('--font', prefs.font); 
        if(prefs.isLight) document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); 
        let fSel = document.getElementById('font-select'); if(fSel) fSel.value = prefs.font;
        let fxSel = document.getElementById('fx-select'); if(fxSel) fxSel.value = prefs.fx;
        initFX(); 
    }
    function openSettings() { document.getElementById('settings-drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeAllDrawers() { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById('overlay').classList.remove('open'); editingSchedIdx = -1; }

    const palette = document.getElementById('color-palette');
    if(palette) { palette.innerHTML = ''; colors.forEach(c => { palette.innerHTML += `<span class="color-btn" style="background:${c}" onclick="setPref('primary', '${c}')"></span>`; }); }

    function getGenreStyle(g) {
        let color = "#64748b", bg = "rgba(100, 116, 139, 0.15)";
        if(g.includes('عاشقانه') || g.includes('رومنس')) { color = "#ec4899"; bg = "rgba(236, 72, 153, 0.15)"; } 
        else if(g.includes('اکشن') || g.includes('جنگی')) { color = "#ef4444"; bg = "rgba(239, 68, 68, 0.15)"; } 
        else if(g.includes('کمدی') || g.includes('خنده')) { color = "#f59e0b"; bg = "rgba(245, 158, 11, 0.15)"; } 
        else if(g.includes('ترسناک') || g.includes('وحشت')) { color = "#e11d48"; bg = "rgba(225, 29, 72, 0.15)"; } 
        else if(g.includes('تخیلی') || g.includes('فانتزی') || g.includes('جادویی')) { color = "#0ea5e9"; bg = "rgba(14, 165, 233, 0.15)"; } 
        else if(g.includes('درام')) { color = "#8b5cf6"; bg = "rgba(139, 92, 246, 0.15)"; } 
        else if(g.includes('تاریخی') || g.includes('قدیمی')) { color = "#d97706"; bg = "rgba(217, 119, 6, 0.15)"; } 
        else if(g.includes('رازآلود') || g.includes('معمایی')) { color = "#10b981"; bg = "rgba(16, 185, 129, 0.15)"; }
        else if(g.includes('مدرسه')) { color = "#14b8a6"; bg = "rgba(20, 184, 166, 0.15)"; }
        else if(g.includes('ماجراجویی')) { color = "#84cc16"; bg = "rgba(132, 204, 22, 0.15)"; }
        else if(g.includes('ایسکای') || g.includes('تناسخ')) { color = "#d946ef"; bg = "rgba(217, 70, 239, 0.15)"; }
        else if(g.includes('هنرهای رزمی') || g.includes('تهذیب') || g.includes('شمشیر')) { color = "#3b82f6"; bg = "rgba(59, 130, 246, 0.15)"; }
        return `color:${color}; background:${bg}; border: 1px solid ${color};`;
    }

    window.getProjectScore = function(p) {
        if(!p) return 0;
        let s = p.news ? p.news.length : 0;
        if(p.seasons) { Object.values(p.seasons).forEach(sea => { s += Object.keys(sea.files || {}).length; s += Object.keys(sea.subs || {}).length; }); }
        return s;
    }

    window.openStory = function(tId, pId, msg) {
        if(msg) Toast.fire({icon: 'success', title: msg});
        let p = null; db.team.forEach(t => { let f = t.projects.find(x => x.id === pId); if(f) p = f; });
        if(p) { let lsData = JSON.parse(localStorage.getItem('animeblack_seen_scores')) || {}; lsData[pId] = getProjectScore(p); localStorage.setItem('animeblack_seen_scores', JSON.stringify(lsData)); }
        renderWatchlist(); showMediaHub(tId, pId);
    }

    window.openLinkedProject = function(title) {
        let foundT = null, foundP = null;
        db.team.forEach(t => t.projects.forEach(p => { if(p.name === title || (p.aliases && p.aliases.includes(title))) { foundT = t.id; foundP = p.id; } }));
        if(foundP) showMediaHub(foundT, foundP); else Toast.fire({icon: 'error', title: 'این سریال هنوز برای دانلود قرار نگرفته است.'});
    }

    window.doSearch = function(q) {
        const resBox = document.getElementById('search-results');
        if(!q.trim()) { resBox.classList.add('hidden'); return; }
        let results = []; const query = q.toLowerCase().trim();
        db.team.forEach(t => { t.projects.forEach(p => { 
            const n1 = (p.name||'').toLowerCase(); const n2 = (p.nameEn||'').toLowerCase(); 
            let match = n1.includes(query) || n2.includes(query); 
            if(!match && p.aliases) { match = p.aliases.some(a => a.toLowerCase().includes(query)); } 
            if(!match && p.genres) { match = p.genres.some(g => g.toLowerCase().includes(query)); } 
            if(match) results.push({ tId: t.id, p: p }); 
        }); });
        resBox.innerHTML = ''; 
        if(results.length === 0) resBox.innerHTML = '<div style="padding:15px; text-align:center; color:var(--text-muted);">هیچ نتیجه‌ای یافت نشد.</div>'; 
        else { results.forEach(r => { let s1 = r.p.seasons[1] || Object.values(r.p.seasons)[0]; resBox.innerHTML += `<div class="search-item" onclick="document.getElementById('search-results').classList.add('hidden'); showMediaHub(${r.tId}, ${r.p.id})"><img src="${s1.img}"><div><div style="font-weight:bold; color:var(--primary); font-size:0.95rem;">${r.p.name}</div><div style="font-size:0.75rem; color:var(--text-muted); font-family:monospace; direction:ltr; text-align:right;">${r.p.nameEn}</div></div></div>`; }); }
        resBox.classList.remove('hidden');
    }
    document.addEventListener('click', (e) => { if(!e.target.closest('.search-box')) { document.getElementById('search-results').classList.add('hidden'); } });

    window.showGenreResults = function(genre) {
        let results = []; db.team.forEach(t => { t.projects.forEach(p => { if(p.genres && p.genres.includes(genre)) results.push({t, p}); }); });
        let html = `<div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-height:60vh; overflow-y:auto; padding: 10px;">`;
        if(results.length === 0) html += `<div style="color:var(--text-muted);">اثری در این ژانر یافت نشد.</div>`;
        results.forEach(r => { let s1 = r.p.seasons[1] || Object.values(r.p.seasons)[0]; html += `<div style="width:105px; cursor:pointer; transition:0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="showMediaHub(${r.t.id}, ${r.p.id})"><img src="${s1.img}" style="width:100%; height:145px; border-radius:10px; object-fit:cover; border:1px solid var(--glass-border); box-shadow:0 5px 15px rgba(0,0,0,0.4);"><div style="font-size:0.75rem; font-weight:bold; text-align:center; margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text);">${r.p.name}</div></div>`; });
        html += `</div><button onclick="Swal.close()" class="admin-btn" style="background:var(--card); color:var(--text); border:1px solid var(--text-muted); margin-top:15px;"><i class="fas fa-times"></i> بستن</button>`; Swal.fire({ title: `<i class="fas fa-tag" style="color:var(--primary)"></i> ژانر: ${genre}`, html: html, background: 'var(--card)', color: 'var(--text)', showConfirmButton: false, width: '450px' });
    }

    window.markWatched = function(pId, sId, ep, elId) { if(!watchedHistory[pId]) watchedHistory[pId] = []; const code = `${sId}_${ep}`; if(!watchedHistory[pId].includes(code)) { watchedHistory[pId].push(code); localStorage.setItem('animeblack_watched', JSON.stringify(watchedHistory)); const row = document.getElementById(elId); if(row) { row.classList.add('ep-watched'); const titleSpan = row.querySelector('.ep-title'); if(titleSpan) titleSpan.innerHTML = `<i class="fas fa-eye ep-watched-icon"></i>` + titleSpan.innerHTML; } } }

    function getNextAiring(targetDay, timeStr) { const now = new Date(); const [hours, mins] = timeStr.split(':').map(Number); let next = new Date(now); next.setHours(hours, mins, 0, 0); let dayDiff = targetDay - now.getDay(); if (dayDiff < 0 || (dayDiff === 0 && now.getTime() > next.getTime())) { dayDiff += 7; } next.setDate(next.getDate() + dayDiff); return next.getTime(); }
    
    function checkScheduleAutoUpdate() {
        let changed = false; const now = Date.now();
        db.schedule.forEach(i => {
            if(!i.season) i.season = 1; if(!i.ep) i.ep = 1;
            if(!i.isPaused) {
                let nextTime = getNextAiring(parseInt(i.day), i.time);
                if(i.lastAirMs && now > i.lastAirMs) { 
                    let airedEp = parseInt(i.ep); i.ep = airedEp + 1; i.lastAirMs = nextTime; changed = true; 
                    
                    let foundT = null, foundP = null, tName = 'نامشخص';
                    db.team.forEach(t => t.projects.forEach(p => { if(p.name === i.title || (p.aliases && p.aliases.includes(i.title))) { foundT = t.id; foundP = p.id; tName = t.name; } }));
                    
                    if(foundP) { let inQ = db.translation.some(tr => tr.pId === foundP && parseInt(tr.ep) === airedEp); if(!inQ) { db.translation.push({ id: Date.now() + Math.floor(Math.random()*1000), img: i.img, title: i.title, ep: airedEp, translator: tName, tId: foundT, pId: foundP }); } }
                } else if(!i.lastAirMs) { i.lastAirMs = nextTime; changed = true; }
            }
        });
        if(changed) saveDB();
    }

            `,
            background: 'var(--card)',

        html += `</div><div class="admin-form" style="text-align:right; border-top:1px dashed #555; padding-top:10px;"><input id="ach_n" placeholder="نام کاراکتر"><input id="ach_img" placeholder="لینک عکس پروفایل" dir="ltr"><select id="ach_role" style="margin-bottom:5px;"><option value="main">شخصیت اصلی</option><option value="sub">شخصیت فرعی</option></select></div><button onclick="addChar(${tId}, ${pId})" style="background:var(--primary); color:white; border:none; width:100%; margin-top:5px; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;"><i class="fas fa-plus"></i> افزودن کاراکتر</button><button onclick="manageTranslatorAdmin(${tId})" style="width:100%; margin-top:5px; background:var(--card); color:var(--text); border:1px solid var(--text-muted); border-radius:8px; padding:10px; font-weight:bold; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='var(--primary)'; this.style.color='white'; this.style.borderColor='var(--primary)'">بازگشت</button>`;
        Swal.fire({ title: `کاراکترها`, html: html, background: 'var(--card)', color: 'var(--text)', showConfirmButton: false, showCloseButton: false });
    }
    window.addChar = function(tId, pId) { const p = db.team.find(x => x.id === tId).projects.find(x => x.id === pId); let n = document.getElementById('ach_n').value.trim(); let img = document.getElementById('ach_img').value.trim() || 'https://via.placeholder.com/150'; let role = document.getElementById('ach_role').value; if(!n) return Toast.fire({icon:'error', title:'نام کاراکتر الزامیست'}); p.characters.push({ name: n, img: img, role: role }); saveDB(); manageAdminChars(tId, pId); }
    window.delChar = function(tId, pId, idx) { const p = db.team.find(x => x.id === tId).projects.find(x => x.id === pId); p.characters.splice(idx, 1); saveDB(); manageAdminChars(tId, pId); }

    window.manageAdminNews = function(tId, pId) {
        const p = db.team.find(x => x.id === tId).projects.find(x => x.id === pId); let html = `<div style="max-height:40vh; overflow-y:auto; padding-right:5px; margin-bottom:15px;">`;
        if(p.news && p.news.length > 0) { p.news.forEach((n, idx) => { html += `<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); border:1px solid #444; padding:8px; border-radius:8px; margin-bottom:5px; text-align:right;"><div><div style="font-weight:bold; color:var(--primary); font-size:0.85rem;">${n.title}</div><div style="font-size:0.7rem; color:#888;">${n.date}</div></div><button onclick="delNews(${tId}, ${pId}, ${idx})" style="background:#ef4444; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;"><i class="fas fa-trash"></i></button></div>`; }); } else { html += `<div style="text-align:center; opacity:0.5; font-size:0.85rem;">خبری ثبت نشده است.</div>`; }
        html += `</div><div class="admin-form" style="text-align:right; border-top:1px dashed #555; padding-top:10px;"><input id="an_t" placeholder="عنوان خبر / مقاله"><input id="an_m" placeholder="لینک عکس یا ویدیو (mp4.)" dir="ltr"><textarea id="an_c" placeholder="متن کامل خبر..." rows="3"></textarea></div><button onclick="addNews(${tId}, ${pId})" style="background:var(--primary); color:white; border:none; width:100%; margin-top:5px; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;"><i class="fas fa-plus"></i> انتشار خبر</button><button onclick="manageTranslatorAdmin(${tId})" style="width:100%; margin-top:5px; background:var(--card); color:var(--text); border:1px solid var(--text-muted); border-radius:8px; padding:10px; font-weight:bold; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='var(--primary)'; this.style.color='white'; this.style.borderColor='var(--primary)'">بازگشت</button>`;
        Swal.fire({ title: `اخبار و مقالات`, html: html, background: 'var(--card)', color: 'var(--text)', showConfirmButton: false, showCloseButton: false });
    }
    window.addNews = function(tId, pId) { const p = db.team.find(x => x.id === tId).projects.find(x => x.id === pId); let t = document.getElementById('an_t').value.trim(); let m = document.getElementById('an_m').value.trim() || 'https://via.placeholder.com/400x200'; let c = document.getElementById('an_c').value.trim(); if(!t) return Toast.fire({icon:'error', title:'عنوان خبر الزامیست'}); const d = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date()); p.news.unshift({ title: t, media: m, content: c, date: d }); saveDB(); manageAdminNews(tId, pId); }
    window.delNews = function(tId, pId, idx) { const p = db.team.find(x => x.id === tId).projects.find(x => x.id === pId); p.news.splice(idx, 1); saveDB(); manageAdminNews(tId, pId); }

    window.editDBSchedule = function(idx) {
        editingSchedIdx = idx;
        let i = db.schedule[idx];
        document.getElementById('s_img').value = i.img || ''; document.getElementById('s_t').value = i.title || ''; document.getElementById('s_s').value = i.season || 1; document.getElementById('s_e').value = i.ep || 1; document.getElementById('s_d').value = i.day || 6; document.getElementById('s_ti').value = i.time || '';
        document.getElementById('btn_add_sched').innerText = 'ذخیره ویرایش'; document.getElementById('btn_add_sched').style.background = '#8b5cf6';
    }

    window.saveDBSchedule = function() {
        let data = { 
            id: (editingSchedIdx > -1) ? db.schedule[editingSchedIdx].id : Date.now(), 
            img: document.getElementById('s_img').value, title: document.getElementById('s_t').value, season: document.getElementById('s_s').value || 1, ep: document.getElementById('s_e').value || 1, day: document.getElementById('s_d').value, time: document.getElementById('s_ti').value, isPaused: (editingSchedIdx > -1) ? db.schedule[editingSchedIdx].isPaused : false, lastAirMs: (editingSchedIdx > -1) ? db.schedule[editingSchedIdx].lastAirMs : null
        };
        if(editingSchedIdx > -1) { db.schedule[editingSchedIdx] = data; editingSchedIdx = -1; document.getElementById('btn_add_sched').innerText = 'ثبت پخش جدید'; document.getElementById('btn_add_sched').style.background = 'var(--primary)'; } else { db.schedule.push(data); }
        saveDB(); window.admTab('sched');
    }

    window.addSmartTranslation = function() {
        let val = document.getElementById('tr_proj').value; if(!val) return Toast.fire({icon:'error', title:'لطفا یک پروژه انتخاب کنید'});
        let [tId, pId] = val.split('|'); let p = db.team.find(t=>t.id==tId).projects.find(x=>x.id==pId); let sData = p.seasons[1] || Object.values(p.seasons)[0];
        db.translation.push({ id: Date.now(), img: sData.img, title: p.name, ep: document.getElementById('tr_ep').value || 1, translator: document.getElementById('tr_n').value || 'نامشخص', tId: parseInt(tId), pId: parseInt(pId) });
        saveDB(); window.admTab('trans');
    }

    window.markTransDone = function(idx) {
        Swal.fire({title:'آیا مطمئن هستید؟', text:'قسمت انتخاب شده به صورت خودکار در صفحه انیمه به عنوان (ترجمه شده) ثبت شده و از این لیست حذف می‌شود.', icon:'warning', showCancelButton:true, confirmButtonText:'بله، انجام شد', cancelButtonText:'انصراف', background:'var(--card)', color:'var(--text)'}).then(res => {
            if(res.isConfirmed) { 
                let item = db.translation[idx];
                if(item.tId && item.pId) { let p = db.team.find(t=>t.id==item.tId).projects.find(x=>x.id==item.pId); if(p) { let actS = p.adminActiveS || 1; if(!p.seasons[actS].subs) p.seasons[actS].subs = {}; p.seasons[actS].subs[item.ep] = "#translated"; } }
                db.translation.splice(idx, 1); saveDB(); window.admTab('trans'); Toast.fire({icon:'success', title:'اتوماتیک ثبت شد'}); 
            }
        });
    }

    window.addDB = function(table) { if(table === 'recommendations') db.recommendations.push({ id: Date.now(), img: document.getElementById('r_img').value, title: document.getElementById('r_t').value, desc: document.getElementById('r_d').value, eps: document.getElementById('r_e').value, duration: document.getElementById('r_du').value, year: document.getElementById('r_y').value, platform: document.getElementById('r_p').value }); saveDB(); window.admTab(table); }
    window.delDB = function(table, idx) { db[table].splice(idx, 1); saveDB(); window.admTab(table); }
    window.exportDB = function() { document.getElementById('db-backup').innerText = `window.PRELOADED_DB = ${JSON.stringify(db)};`; closeAllDrawers(); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(["<!DOCTYPE html>\n" + document.documentElement.outerHTML], {type:'text/html;charset=utf-8'})); a.download='AnimeBlack_Master.html'; a.click(); Toast.fire({icon:'success', title:'دیتابیس دانلود شد'}); }

    setInterval(() => {
        try { 
            document.querySelectorAll('.neon-countdown').forEach(el => { 
                const nextMs = parseInt(el.getAttribute('data-next')); const rem = nextMs - Date.now(); 
                const barId = el.id.split('-')[1]; const bar = document.getElementById('prog-' + barId);
                if(rem <= 0) { el.innerHTML = `<span style="color:#10b981; font-weight:bold; font-size:1.1rem; animation:pulse 1s infinite; padding:5px 0;">پخش شد!</span>`; if(bar) bar.style.width = '100%'; return; } 
                const d = Math.floor(rem / 86400000), h = Math.floor((rem % 86400000) / 3600000), m = Math.floor((rem % 3600000) / 60000), s = Math.floor((rem % 60000) / 1000); 
                el.innerHTML = `<div class="neon-box"><span>${d}</span><small>روز</small></div><div class="neon-box"><span>${h.toString().padStart(2,'0')}</span><small>ساعت</small></div><div class="neon-box"><span>${m.toString().padStart(2,'0')}</span><small>دقیقه</small></div><div class="neon-box" style="border-color:var(--primary)"><span style="color:var(--primary); text-shadow:0 0 8px var(--primary)">${s.toString().padStart(2,'0')}</span><small style="color:var(--primary)">ثانیه</small></div>`;
                if(bar) { let percent = ((604800000 - rem) / 604800000) * 100; bar.style.width = Math.max(0, Math.min(100, percent)) + '%'; } 
            }); 
        } catch(e) {}
    }, 1000);

    const cvs = document.getElementById('fx-canvas'); const ctx = cvs.getContext('2d'); let particles = [];
    const neonColors = ['#00f3ff', '#00bfff', '#0077ff', '#0044cc', '#4d4dff', '#8b5cf6', '#d946ef', '#c026d3', '#f59e0b', '#ef4444', '#f43f5e', '#10b981', '#14b8a6', '#0ea5e9', '#39ff14', '#ccff00', '#ff00ff'];
    let fxLoop;
    
    window.initFX = function() {
        cancelAnimationFrame(fxLoop); cvs.width = window.innerWidth; cvs.height = window.innerHeight; particles = [];
        if(prefs.fx === 'none') { ctx.clearRect(0,0,cvs.width,cvs.height); return; }
        for(let i=0; i<60; i++) { particles.push({ x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: prefs.fx === 'snow' ? (Math.random()*15 + 10) : (Math.random()*20 + 10), speed: Math.random()*0.6 + 0.2, wobbleA: Math.random()*Math.PI*2, rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.02, flipA: Math.random()*Math.PI*2, flipSpeed: Math.random()*0.02 + 0.01, c: neonColors[Math.floor(Math.random()*neonColors.length)] }); }
        drawFX();
    }
    
    function drawFX() {
        if(prefs.fx === 'none') return; ctx.clearRect(0, 0, cvs.width, cvs.height);
        particles.forEach(p => {
            if(prefs.fx === 'snow') { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); let scaleX = Math.cos(p.flipA); ctx.scale(scaleX, 1); ctx.fillStyle = prefs.isLight ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.7)'; ctx.shadowBlur = 8; ctx.shadowColor = prefs.isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.5)'; ctx.font = p.s + "px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("❅", 0, 0); ctx.restore(); p.y += p.speed * 1.2; p.x += Math.sin(p.wobbleA) * 0.4; p.wobbleA += 0.01; p.rot += p.rotSpeed; p.flipA += p.flipSpeed; } 
            else if(prefs.fx === 'rain') { ctx.strokeStyle = p.c; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.globalAlpha = 0.8; ctx.shadowBlur = 15; ctx.shadowColor = p.c; ctx.beginPath(); let dropWobble = Math.sin(p.wobbleA) * 1.5; ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + dropWobble, p.y + p.s); ctx.stroke(); ctx.shadowBlur = 0; ctx.globalAlpha = 1; p.y += p.speed * 1.5; p.wobbleA += 0.03; }
            if(p.y > cvs.height + 50) { p.y = -50; p.x = Math.random() * cvs.width; }
            if(p.x < -50) p.x = cvs.width + 50; if(p.x > cvs.width + 50) p.x = -50;
        });
        fxLoop = requestAnimationFrame(drawFX);
    }
    
    let lastW = window.innerWidth; window.addEventListener('resize', () => { if(prefs.fx !== 'none' && Math.abs(window.innerWidth - lastW) > 100) { lastW = window.innerWidth; initFX(); } });

    checkScheduleAutoUpdate(); 
    applyPrefs(); renderAll(); 
</script>
